services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ledgerly
      POSTGRES_PASSWORD: ledgerly
      POSTGRES_DB: ledgerly
    ports:
      - "5432:5432"
    volumes:
      - ledgerly-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledgerly -d ledgerly"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./app/backend
    environment:
      PORT: 8080
      APP_ENV: local
      APP_VERSION: v1.0.0
      DATABASE_URL: postgres://ledgerly:ledgerly@postgres:5432/ledgerly
      DB_SSL: "false"
      CORS_ORIGIN: "*"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      default:
        aliases:
          - ledgerly-backend

  frontend:
    build: ./app/frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  ledgerly-data:
