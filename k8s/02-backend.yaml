apiVersion: v1
kind: Service
metadata:
  name: ledgerly-backend
  namespace: ledgerly
spec:
  selector:
    app: ledgerly-backend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ledgerly-backend
  namespace: ledgerly
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ledgerly-backend
  template:
    metadata:
      labels:
        app: ledgerly-backend
    spec:
      containers:
        - name: backend
          image: ogccr.azurecr.io/ledgerly-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080

          env:
            - name: PORT
              value: "8080"
            - name: APP_ENV
              value: production
            - name: APP_VERSION
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['pod-template-hash']
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ledgerly-secrets
                  key: DATABASE_URL
            - name: DB_SSL
              valueFrom:
                secretKeyRef:
                  name: ledgerly-secrets
                  key: DB_SSL
            - name: CORS_ORIGIN
              value: "*"

          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 8
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20

          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi