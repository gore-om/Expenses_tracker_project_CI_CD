apiVersion: apps/v1
kind: Deployment
metadata:
  name: ledgerly-frontend
  namespace: ledgerly
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ledgerly-frontend
  template:
    metadata:
      labels:
        app: ledgerly-frontend
    spec:
      imagePullSecrets:
        - name: acr-secret   # ✅ FIX

      containers:
        - name: frontend
          image: ogccr.azurecr.io/ledgerly-frontend:13-fc8100d
          imagePullPolicy: Always

          ports:
            - containerPort: 80

          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 20